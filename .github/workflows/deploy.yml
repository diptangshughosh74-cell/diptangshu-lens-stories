name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Explicitly give the token write access to push the built files to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # WARNING: Change "dist" to "build" if you are using Create React App (CRA)
          folder: dist 
          branch: gh-pages
